  content: |-
    This Ecma standard speciﬁes the syntax and semantics of the Dart programming language.
    It does not specify the APIs of the Dart libraries except where those library elements are essential to the correct functioning of the language itself (e.g., the existence of class Object with methods such as noSuchMethod, runtimeType).
