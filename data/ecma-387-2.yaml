  content: |-
    This Standard specifies a physical layer (PHY), distributed medium access control (MAC) sublayer, and an HDMI protocol adaptation layer (PAL) for 60 GHz wireless networks.
    ECMA-387 uses Specifier IDs that are maintained in this Register.
    In their fast-track approval procedure, ISO/IEC JTC 1 amended and approved the 1st edition as ISO/IEC 13156:2009. This 2nd edition has also been fast-tracked to ISO/IEC JTC 1.
