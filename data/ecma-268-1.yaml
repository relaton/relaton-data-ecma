abstract:
- language: en
  script: Latn
  content: |-
    This Ecma Standard specifies the mechanical, physical and optical characteristics of a 80 mm, read-only optical disk to enable the interchange of such disks. It specifies the quality of the recorded signals, the format of the data and the recording method, thereby allowing for information interchange by means of such disks. This disk is identified as DVD – Read-Only Disk.
    This Ecma Standard specifies
    This Ecma Standard provides for interchange of disks between disk drives. Together with a standard for volume and file structure, it provides for full data interchange between data processing systems.
